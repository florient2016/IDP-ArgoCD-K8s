# ClusterIssuers + Certificate wildcard — wave 3 :
# le webhook cert-manager doit être prêt avant de créer les issuers.
# NOTE : le secret cloudflare-api-token N'EST PAS dans Git (jamais de
# secret en clair dans un repo). Il reste créé à la main jusqu'à la
# Phase 2 (Vault + External Secrets), qui le prendra en charge.
# >>> Remplace <TON_ORG> <<<
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://github.com/florient2016/IDP-ArgoCD-K8s.git
    targetRevision: master
    path: platform-repo/config/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff: {duration: 10s, factor: 2, maxDuration: 3m}
