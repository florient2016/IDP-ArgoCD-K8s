apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metrics-server
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://kubernetes-sigs.github.io/metrics-server/
    chart: metrics-server
    targetRevision: 3.12.*
    helm:
      valuesObject:
        args:
          # kubeadm : les kubelets servent des certs auto-signés,
          # sans ce flag metrics-server refuse de scraper
          - --kubelet-insecure-tls
        resources:
          requests: {cpu: 50m, memory: 64Mi}
          limits: {memory: 128Mi}
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated: {prune: true, selfHeal: true}