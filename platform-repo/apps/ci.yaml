# Chaîne CI : tasks + pipeline + triggers + secrets CI (robot Harbor, PAT Git).
# Wave 7 : Tekton et Harbor doivent être prêts.
# >>> Remplace <TON_ORG> <<<
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ci
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: https://github.com/florient2016/IDP-ArgoCD-K8s.git
    targetRevision: master
    path: platform-repo/config/ci
  destination:
    server: https://kubernetes.default.svc
    namespace: ci
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: -1
      backoff: {duration: 30s, factor: 2, maxDuration: 5m}
