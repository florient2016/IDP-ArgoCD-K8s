# Backstage v2 — image CUSTOM buildée par le pipeline (méthode officielle),
# plus jamais l'image de démo ghcr.io (51 boots perdus lui rendent hommage).
# >>> Mettre à jour "tag" avec le SHA produit par le pipeline (puis
#     automatisable : le pipeline bump ce fichier comme pour demo-app). <<<
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  project: default
  source:
    repoURL: https://backstage.github.io/charts
    chart: backstage
    targetRevision: 2.*
    helm:
      valuesObject:
        backstage:
          image:
            registry: harbor.apps.itssolutions.me
            repository: apps/backstage-app
            tag: "<SHA_DU_BUILD>"          # ex: 3fa9c21b — jamais latest
          extraEnvVars:
            - name: POSTGRES_HOST
              value: backstage-db-rw
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef: {name: backstage-db-app, key: username}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: backstage-db-app, key: password}
          extraEnvVarsSecrets:
            - backstage-secrets              # GITEA_TOKEN, BACKEND_SECRET
          # La config vit DANS l'image (app-config.production.yaml, versionnée
          # dans le repo backstage-app) — plus d'appConfig injecté par le chart.
          # Le chart de démo perdait la course des migrations ; notre app
          # n'embarque que nos plugins : catalog, scaffolder(+gitea),
          # techdocs, search, auth — ni signals ni mcp-actions.
          args: ["--config", "app-config.yaml", "--config", "app-config.production.yaml"]
          startupProbe:
            httpGet: {path: /.backstage/health/v1/readiness, port: 7007}
            periodSeconds: 10
            failureThreshold: 60
          livenessProbe:
            httpGet: {path: /.backstage/health/v1/readiness, port: 7007}
            periodSeconds: 20
            failureThreshold: 6
          readinessProbe:
            httpGet: {path: /.backstage/health/v1/readiness, port: 7007}
            periodSeconds: 10
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits: {memory: 1Gi}
        # pull depuis Harbor (projet privé) :
        imagePullSecrets:
          - harbor-pull
        ingress:
          enabled: true
          className: nginx
          host: backstage.apps.itssolutions.me
          tls:
            enabled: true
            secretName: wildcard-apps-tls
        postgresql:
          enabled: false                     # CNPG, toujours
  destination:
    server: https://kubernetes.default.svc
    namespace: backstage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: backstage
      jsonPointers:
        - /spec/strategy                     # Recreate patché à la main (chart ne l'expose pas)
