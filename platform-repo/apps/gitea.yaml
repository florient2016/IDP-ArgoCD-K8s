# Gitea — forge Git interne pour les projets itssolutions (plan applicatif).
# git.apps.itssolutions.me | admin servi par Vault/ESO (secret gitea-admin)
#
# v2 — architecture simplifiée suite au retrait des images Bitnami de
# Docker Hub (postgresql/redis-cluster impullables) :
#   - Base de données : SQLite sur le PVC Longhorn (recommandé par Gitea
#     pour les petites instances ; migration PostgreSQL possible plus tard
#     via gitea dump/restore si l'instance grossit)
#   - Cache/sessions : mémoire locale | Queues : level (sur disque)
#   - AUCUN sous-chart Bitnami => un seul pod, une seule image (officielle)
#
# Le repo platform (control plane) reste sur GitHub — Gitea n'héberge
# que le code des apps et les repos <app>-config.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gitea
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://dl.gitea.com/charts
    chart: gitea
    targetRevision: 10.6.*
    helm:
      valuesObject:
        # ── Gitea lui-même ─────────────────────────────────────────
        gitea:
          admin:
            existingSecret: gitea-admin        # ExternalSecret (config/gitea/)
            email: admin@itssolutions.me
          config:
            server:
              DOMAIN: git.apps.itssolutions.me
              ROOT_URL: https://git.apps.itssolutions.me
              SSH_DOMAIN: git.apps.itssolutions.me
            database:
              DB_TYPE: sqlite3                 # sur le PVC — zéro dépendance
            cache:
              ADAPTER: memory
            session:
              PROVIDER: memory
            queue:
              TYPE: level                      # queues persistées sur le PVC
            service:
              DISABLE_REGISTRATION: true       # comptes créés par l'admin
            webhook:
              # autoriser les webhooks vers l'EventListener Tekton (interne)
              ALLOWED_HOST_LIST: "*.apps.itssolutions.me,*.svc,*.svc.cluster.local"
            actions:
              ENABLED: false                   # la CI, c'est Tekton

        # ── Topologie : mono-réplica (sessions/cache en mémoire) ──
        replicaCount: 1

        persistence:
          enabled: true
          storageClass: longhorn
          size: 10Gi

        # ── Sous-charts externes : TOUS désactivés ─────────────────
        # (toutes les variantes de noms selon les versions du chart ;
        #  les clés inconnues sont ignorées sans erreur)
        redis-cluster:
          enabled: false
        redis:
          enabled: false
        postgresql:
          enabled: false
        postgresql-ha:
          enabled: false
        valkey-cluster:
          enabled: false
        valkey:
          enabled: false

        resources:
          requests: {cpu: 100m, memory: 256Mi}
          limits: {memory: 512Mi}

        ingress:
          enabled: true
          className: nginx
          annotations:
            # les push git peuvent être volumineux
            nginx.ingress.kubernetes.io/proxy-body-size: "0"
          hosts:
            - host: git.apps.itssolutions.me
              paths: [{path: /, pathType: Prefix}]
          tls:
            - hosts: [git.apps.itssolutions.me]
              secretName: wildcard-apps-tls
  destination:
    server: https://kubernetes.default.svc
    namespace: gitea
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
