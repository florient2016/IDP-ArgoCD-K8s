# Config ESO — wave 5 : Vault et ESO doivent tourner avant.
# NOTE : ces ressources resteront en erreur ("connection refused" /
# "Vault is sealed") tant que Vault n'est pas initialisé et configuré
# via vault-setup.sh — c'est attendu, le retry converge ensuite.
# >>> Remplace <TON_ORG> <<<
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://github.com/florient2016/IDP-ArgoCD-K8s.git
    targetRevision: main
    path: config/external-secrets
  destination:
    server: https://kubernetes.default.svc
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: -1                      # retry infini : dépend de l'init manuelle de Vault
      backoff: {duration: 30s, factor: 2, maxDuration: 5m}
