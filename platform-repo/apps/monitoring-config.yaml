# App qui applique les PrometheusRule + policies Kyverno + le pruner.
# Wave 10 : APRÈS que les CRDs (Prometheus, Kyverno) existent, sinon
# "no matches for kind PrometheusRule".
# >>> Remplace <TON_ORG> <<<
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: default
  sources:
    - repoURL: https://github.com/florient2016/IDP-ArgoCD-K8s.git
      targetRevision: master
      path: platform-repo/config/monitoring
    - repoURL: https://github.com/florient2016/IDP-ArgoCD-K8s.git
      targetRevision: master
      path: platform-repo/config/kyverno
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    retry:
      limit: -1
      backoff: {duration: 30s, factor: 2, maxDuration: 5m}
