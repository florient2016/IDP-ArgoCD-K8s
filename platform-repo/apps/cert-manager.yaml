apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.16.*
    helm:
      valuesObject:
        crds:
          enabled: true
        # décommente si ton CoreDNS pose problème pour les self-checks DNS-01 :
        # extraArgs:
        #   - --dns01-recursive-nameservers=1.1.1.1:53,8.8.8.8:53
        #   - --dns01-recursive-nameservers-only
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true        # indispensable : les CRDs cert-manager sont énormes
