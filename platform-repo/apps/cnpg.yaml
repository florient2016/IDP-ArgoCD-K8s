# CloudNativePG — opérateur PostgreSQL (base de Backstage, et de toute
# future app qui aura besoin d'un PostgreSQL sérieux : le pattern
# "PG as a service" que Crossplane/Backstage exposeront plus tard).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.22.*
    helm:
      valuesObject:
        resources:
          requests: {cpu: 50m, memory: 128Mi}
          limits: {memory: 256Mi}
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true      # CRDs volumineuses
