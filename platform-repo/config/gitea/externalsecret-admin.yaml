# Compte admin Gitea, servi depuis Vault.
# Prérequis (une fois) :
#   vault kv put secret/gitea admin-username='gitea-admin' admin-password='<FORT>'
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gitea-admin
  namespace: gitea
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: gitea-admin
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef: {key: gitea, property: admin-username}
    - secretKey: password
      remoteRef: {key: gitea, property: admin-password}
