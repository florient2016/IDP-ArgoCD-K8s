# PostgreSQL pour Backstage — cluster CNPG mono-instance (lab).
# CNPG génère lui-même le secret "backstage-db-app" (user/password/uri)
# que Backstage consommera. Passer à instances: 2 pour de la vraie HA.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: backstage-db
  namespace: backstage
spec:
  instances: 1
  storage:
    size: 5Gi
    storageClass: longhorn
  resources:
    requests: {cpu: 100m, memory: 256Mi}
    limits: {memory: 512Mi}
  bootstrap:
    initdb:
      database: backstage
      owner: backstage
