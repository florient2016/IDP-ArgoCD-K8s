# Secrets Backstage servis par Vault.
# Prérequis (une fois) :
#   vault kv put secret/backstage gitea-token='<PAT_BACKSTAGE>' backend-secret="$(openssl rand -hex 24)"
# Le PAT backstage (compte de service Gitea dédié) sert au catalogue
# (lecture) ET au scaffolder (création de repos => scopes org RW + repo RW,
# comme le PAT admin-api — voir README §2).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backstage-secrets
  namespace: backstage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: backstage-secrets
    creationPolicy: Owner
  data:
    - secretKey: GITEA_TOKEN
      remoteRef: {key: backstage, property: gitea-token}
    - secretKey: BACKEND_SECRET
      remoteRef: {key: backstage, property: backend-secret}
