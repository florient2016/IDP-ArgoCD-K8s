# Pipeline dédié backstage-app — implémente le "host build" officiel :
# yarn install/tsc/build:backend dans un task Node (rapide, cachable),
# puis kaniko ne construit QUE l'image runtime (Dockerfile de create-app).
# Un pipeline dédié car le build est 10x plus lourd qu'une app standard.
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-backstage
  namespace: ci
spec:
  params:
    - {name: repo-url, type: string, default: "https://git.apps.itssolutions.me/itssolutions/backstage-app.git"}
    - {name: revision, type: string, default: main}
    - {name: image, type: string, default: "harbor.apps.itssolutions.me/apps/backstage-app"}
  workspaces:
    - name: sources
    - name: docker-credentials
  tasks:
    - name: clone
      taskRef: {name: git-clone-lite}
      workspaces: [{name: output, workspace: sources}]
      params:
        - {name: url, value: $(params.repo-url)}
        - {name: revision, value: $(params.revision)}
    - name: yarn-build
      runAfter: [clone]
      taskRef: {name: backstage-host-build}
      workspaces: [{name: source, workspace: sources}]
    - name: image-build
      runAfter: [yarn-build]
      taskRef: {name: kaniko-build}
      workspaces:
        - {name: source, workspace: sources}
        - {name: docker-config, workspace: docker-credentials}
      params:
        - {name: image, value: "$(params.image):$(tasks.clone.results.commit-short)"}
        - {name: dockerfile, value: packages/backend/Dockerfile}
---
# Le "host build" officiel, en task : install -> tsc -> build:backend
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: backstage-host-build
  namespace: ci
spec:
  workspaces:
    - name: source
  steps:
    - name: yarn
      image: node:20-bookworm
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -eu
        corepack enable
        yarn install --immutable
        yarn tsc
        yarn build:backend
      resources:
        requests: {cpu: "1", memory: 3Gi}
        limits: {cpu: "2", memory: 4Gi}
      # build lourd : ~8-15 min au premier run (téléchargement de tout yarn)
---
# PipelineRun de déclenchement manuel (le premier build, ou re-build à la demande).
# Workspace de 8Gi : node_modules + dist de Backstage sont volumineux.
# NB : le TriggerTemplate générique déclenchera aussi sur les push backstage-app,
# mais avec le pipeline standard (dockerfile racine absent -> échec silencieux).
# Option propre : ajouter un CEL excluant backstage-app du trigger générique,
# et un trigger dédié pointant sur build-backstage (voir README).
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: build-backstage-manual-
  namespace: ci
spec:
  pipelineRef: {name: build-backstage}
  taskRunTemplate:
    serviceAccountName: pipeline-sa
  timeouts:
    pipeline: 45m
  workspaces:
    - name: sources
      volumeClaimTemplate:
        spec:
          storageClassName: longhorn
          accessModes: [ReadWriteOnce]
          resources: {requests: {storage: 8Gi}}
    - name: docker-credentials
      secret: {secretName: harbor-robot-docker}
