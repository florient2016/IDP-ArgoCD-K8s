# Pipeline dédié backstage-app — implémente le "host build" officiel :
# yarn install/tsc/build:backend dans un task Node (rapide, cachable),
# puis kaniko ne construit QUE l'image runtime (Dockerfile de create-app).
# Un pipeline dédié car le build est 10x plus lourd qu'une app standard.
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: build-backstage
  namespace: ci
spec:
  params:
    - {name: repo-url, type: string, default: "https://git.apps.itssolutions.me/itssolutions/backstage-app.git"}
    - {name: revision, type: string, default: main}
    - {name: image, type: string, default: "harbor.apps.itssolutions.me/apps/backstage-app"}
  workspaces:
    - name: sources
    - name: docker-credentials
  tasks:
    - name: clone
      taskRef: {name: git-clone-lite}
      workspaces: [{name: output, workspace: sources}]
      params:
        - {name: url, value: $(params.repo-url)}
        - {name: revision, value: $(params.revision)}
    - name: yarn-build
      runAfter: [clone]
      taskRef: {name: backstage-host-build}
      workspaces: [{name: source, workspace: sources}]
    - name: image-build
      runAfter: [yarn-build]
      taskRef: {name: kaniko-build}
      workspaces:
        - {name: source, workspace: sources}
        - {name: docker-config, workspace: docker-credentials}
      params:
        - {name: image, value: "$(params.image):$(tasks.clone.results.commit-short)"}
        - {name: dockerfile, value: packages/backend/Dockerfile}
---
# Le "host build" officiel, en task : install -> tsc -> build:backend
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: backstage-host-build
  namespace: ci
spec:
  workspaces:
    - name: source
  steps:
    - name: yarn
      image: node:22-bookworm
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -eu
        # chaîne de compilation des modules natifs — alignée sur le
        # Dockerfile officiel create-app (isolated-vm/scaffolder) :
        apt-get update -qq && apt-get install -y -qq python3 g++ build-essential make >/dev/null
        export PYTHON=/usr/bin/python3

        corepack enable
        if ! yarn install --immutable; then
          echo "════ BUILD LOGS DES MODULES NATIFS EN ÉCHEC ════"
          for f in /tmp/xfs-*/build.log; do echo "--- $f"; tail -30 "$f"; done
          exit 1
        fi
        yarn tsc
        yarn build:backend
      computeResources:
        requests: {cpu: "2", memory: 3Gi}
        limits: {cpu: "4", memory: 5Gi}
      # build lourd : ~8-15 min au premier run (téléchargement de tout yarn)
