# Secrets de la chaîne CI, servis par Vault.
# Prérequis (une fois, après création du robot Harbor — voir README §4) :
#   vault kv put secret/ci/harbor-robot username='robot$ci' password='<TOKEN_ROBOT>'
#   vault kv put secret/ci/git-credentials username='git' password='<PAT_GITHUB>'
---
# Credentials de push vers Harbor, au format dockerconfigjson,
# consommé par le task kaniko.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-robot-docker
  namespace: ci
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: harbor-robot-docker
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {"auths":{"harbor.apps.itssolutions.me":{"username":"{{ .username }}","password":"{{ .password }}","auth":"{{ printf "%s:%s" .username .password | b64enc }}"}}}
  data:
    - secretKey: username
      remoteRef: {key: ci/harbor-robot, property: username}
    - secretKey: password
      remoteRef: {key: ci/harbor-robot, property: password}
---
# PAT Git pour le bump de tag GitOps (le pipeline committe dans le repo
# de config applicative). Format basic-auth attendu par git.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: git-credentials
  namespace: ci
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: git-credentials
    creationPolicy: Owner
    template:
      type: kubernetes.io/basic-auth
      metadata:
        annotations:
          tekton.dev/git-0: https://git.apps.itssolutions.me
      data:
        username: "{{ .username }}"
        password: "{{ .password }}"
  data:
    - secretKey: username
      remoteRef: {key: ci/git-credentials, property: username}
    - secretKey: password
      remoteRef: {key: ci/git-credentials, property: password}
