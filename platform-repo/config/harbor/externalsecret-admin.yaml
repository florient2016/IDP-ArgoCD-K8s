# Mot de passe admin Harbor, servi depuis Vault (secret/harbor).
# Prérequis (une fois) :
#   vault kv put secret/harbor admin-password='<MOT_DE_PASSE_FORT>'
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: harbor-admin
  namespace: harbor
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: harbor-admin
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: harbor
        property: admin-password
