# ClusterSecretStore : le pont ESO -> Vault, utilisable depuis tous
# les namespaces. Auth Kubernetes : ESO présente le token de son
# ServiceAccount, Vault le valide via TokenReview.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: http://vault.vault-itssolutions.svc:8200
      path: secret                  # mount KV v2 (activé par vault-setup.sh)
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: external-secrets    # rôle créé par vault-setup.sh
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
