# LE cas d'usage fondateur : le secret Cloudflare n'est plus créé à la
# main. ESO le synchronise depuis Vault (secret/cloudflare) vers le
# namespace cert-manager. La dernière étape manuelle du bootstrap disparaît.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: cloudflare-api-token
  namespace: cert-manager
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: cloudflare-api-token      # même nom que le secret manuel : reprise transparente
    creationPolicy: Owner
  data:
    - secretKey: api-token
      remoteRef:
        key: cloudflare             # secret/cloudflare dans Vault
        property: api-token
